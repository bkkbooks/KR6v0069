body:
  text: 侯沖在明代及其以後的雲南地方文獻中有大量阿吒力密教阿吒力教的記載因所記較零散故對阿吒力教究竟是什麼派別的佛教一直衆說不一目前大致有四種看法一從印度直接傳入雲南的印度密教二從西藏傳入雲南的藏密三從印度傳入雲南後以大理一帶為中心形成的有自己獨特體系的密教即滇密四直接從印度傳入大理的印度密教和從中原傳入大理的漢地密宗的結合體此觀點為筆者未見阿吒力經典時提出人們都知道年發現的大理鳳儀北湯天寫經中有不少阿吒力經典但因被三個不同的單位保管大多看不到原件故不論持何種觀點的學者對阿吒力教經典的認識一直都很模糊所以在所著中對阿吒力經典均未有具體的說明也影響了他們對阿吒力教的認識幸運的是我們在雲南省佛教協會顧問阿吒力僧趙文煥先生處看到了一些阿吒力教經典在探究這批經典的基礎上我們又陸續收集到其他一些經典從而深化了對阿吒力教的認識這無疑是雲南佛教研究的一次突破由於這批阿吒力經典大多不見中外歷代佛書載録也大多未為中外大藏經所收故它們的存世在中國佛教研究中無疑有重要的價值一雲南阿吒力教經典簡目根據目前所見阿吒力經典及周泳先先生整理鳳儀北湯天寫經所編大理國寫經目我們將現存阿吒力經典編了一簡目這個簡目還有待進一步完善但我們相信大部分重要阿吒力經典已在這個簡目中通過這批經典我們已可對阿吒力教的性質作一判斷重廣水陸法施無遮大齊儀雲南省圖書館藏鳳儀出土本殘缺玉溪某居士處藏舊抄本水陸大齊瑜伽密教第一壇水陸大齊瑜伽密教第二壇可資校對楞嚴解冤釋結道場儀八卷題眉陽慧覺寺長講沙門祖照集清乾隆五十一年據明版刻本現藏雲南省圖書館昆明某先生處有光緒十一年段壽榮精抄本缺密教部分小科儀佛門六類解結法事或作六負解結法事據本科儀所纂而成地藏慈悲救苦薦福利生道場儀四冊署餘杭沙門元照集清康熙三十七年抄本現藏昆明某先生處玉溪某居士處藏舊抄本地藏慈悲救苦薦福利生道場綱要及地藏慈悲道場密教並經卷上雲南省圖書館藏大理鳳儀寫經有地藏科上地藏科儀如來廣孝十種報恩道場儀八卷題漢州綿竹大中祥符寺住持長講華嚴海印大師思覺集無抄寫年代現藏昆明某先生處玉溪某居士及另一居士處藏清嘉慶抄本孝順設供拔苦報恩道場儀文卷中卷下及報恩道場儀的紀贊提綱密教部分雲南省機關某先生處有清康熙二十八年抄本孝順設供拔苦報恩道場儀儀文卷上卷中二卷的覆抄本洱源鳳羽某阿吒力處有段宗培抄如來廣孝十種報恩道場儀卷下可資校對銷釋金剛科一卷宋釋宗鏡述清代抄本三種此書見於續藏經有明代注釋本和清抄本天津圖書館也有明刻古本天宮科不分卷包括儀文提綱真言部分中有西竺中巖山祖覺禪師集之句近代抄本其簡本為新集天宮吉祥鴻科儀題大漢民國十年歲次辛酉蒲月後學弟子廣運抄録又有更簡本天宮吉祥科儀敬設諸天淨醮法事包括光明大夜上光明大夜下大理鳳儀北湯天出土現藏雲南省圖書館藥師科名不一又作藥師道場解經頌文灌頂章句教誡儀文佛說消災延壽藥師灌頂章句儀文藥師灌頂章句拔苦過罪生死得度綱目藥師科範等不分卷包括教誡儀文綱目真言四部分署東晉天竺三藏法師閩越金身太平寺沙門若愚述帛尸梨密多羅奉詔譯有嘉慶並光緒抄本玉溪某居士處藏舊抄本藥師七級燈科儀文及近代抄本佛門藥師消災延壽燈科為其簡本另有藥師解結誦經大理鳳儀北湯天出土現藏雲南省圖書館新集西域毛牧淨土勝果道場儀不分卷包括儀文提綱真言三部分署西晉毛牧居士大善知識所集無抄寫年代簡本為淨土法事冥府十王滅罪拔苦科不分卷包括教誡儀文提綱密咒嘉慶十八年抄本新集冥府十王科儀為其簡本雲南省圖書館藏大理鳳儀出土者包括冥王教誡冥王提綱冥王二時冥王三時冥王四禮為殘缺本廣大靈感大悲觀世音菩薩香山寶科儀觀音香山寶科一冊舊抄本瑜伽焰口施食集要壇儀全部署大興善士寺三藏沙門不空翻譯崇聖乞士普爍重閲校證水目比丘心實校訂清光緒十九年刻本又有光緒版署大興善士寺三藏沙門不空翻譯龍山乞士昌禮較校述瑜伽焰口施食科一冊近代抄本中有祭亡白文詞雲南省圖書館藏有大理鳳儀北湯天生土本又有明抄本瑜伽焰口施食集壇不見白文詞關申三府法事有數種抄本釋門下瘟火二醮申奏一冊宣統三年抄本釋門瑜伽破獄破血河金科全部一冊近代抄本佛門九品往生燈科一冊近代抄本佛門迎請聖僧法事一冊近代抄本佛門星辰科儀又作釋門禳星法事一冊近代抄本佛門經咒寶科又題驅邪蕩穢經咒寶科一冊內容近似之書還有諸部因緣科華嚴字母等佛門三府聖誥又題諸佛菩薩諸神寶誥一冊舊抄本有數種釋門預修十三轉集要科儀一冊近代抄本新曆太歲白虎科一冊近代抄本迎黃接駕法事一冊現代抄本召值法事一冊現代抄本啓祖法事一冊現代抄本釋門請聖灶扎發牒回向法事一冊近代抄本進表法事一冊近代抄本釋迦太子浴佛表法事簡本為新集太子沐浴法事一冊近代抄本繞塔開橋散花法事一冊現代抄本神祇法事包括龍王得道水司本主等一冊現代抄本釋門法名傳度法事一冊近代抄本佛門蕩穢法事解穢法事一冊現代抄本退謝回祿法事附佛說避瘟經一冊光緒庚子抄本召值法事揚幡法事一冊現代抄本觀音表法事彌陀表法事彌勒表法事地藏表法事延生表法事浴佛表法事北斗午朝表法事釋迦表法事等或為一冊或合二表為一冊近現代抄本慈悲三昧水懺三卷近代抄本慈悲六根水懺一冊清抄本往生西方極樂寶懺一冊近代抄本觀音經寶懺一冊清抄本又有聖白衣觀音圓通寶懺署成都天王寺賜紫沙門溥輝撰清抄本現藏玉溪某居士處先天斗母敕赦天懺一冊清代抄本祈嗣表玄天表求壽表送聖表或為一冊或合二表為一冊近代抄本釋教瘟火啓師送師安師送師雜録全本一冊清代抄本諸齊道場牒式狀式詞式表式合本一冊明萬曆九年抄本佛門擇黃道日並各式本一冊近代抄本佛門大齊事聖牌一冊現代抄本佛門諸齊佛榜一冊近代抄本太上北斗仙經一冊近代抄本南斗延生真經一冊近代抄本太上玄靈北斗本命延生真經一冊光緒十年抄本大佛頂首楞嚴經唐般辣密諦譯舊抄本地藏菩薩本願經唐實叉難陀譯舊抄本大方便佛報恩經舊抄本佛說藥師灌頂拔除過咎生死得度經題帛尸梨密多羅譯舊抄本金剛經鳩摩羅什譯清抄本及刻本觀音救苦經血盆經灶王經閻王經太陽經太陰經受生經避瘟經舊抄本因為小經故大多是數經合抄在同一本子上很少有單行本很顯然在破四舊和文化大革命以前除了鳳儀有古本經卷外雲南大部分地區尤其是大理地區的洱源劍川鶴慶等縣麗江地區的麗江縣蘭坪等地也保存有不少阿吒力經典所以浩劫後仍有部分經典留存了下來在沒有條件全部看到雲南省圖書館藏那批鳳儀北湯天佛教經典時這些經典就理所當然地成了解開阿吒力教之謎的一把金鑰匙在實地調查中據阿吒力介紹阿吒力經典一般有經懺和科儀基本上是一種科儀有一經一懺但由於經過文化大革命現在仍存世的阿吒力經典經懺的數量較少主要是科儀並有少量有關法會牌式幡式及文書定式的本子存世二雲南阿吒力教經典為明代佛教之教所用科儀從內容上看這批阿吒力科儀儘管大都不見中外歷代佛書載録也大都未為歷代大藏經所收但它們都來自內地都為漢地佛教經典如其中的如來廣孝十種報恩道場儀就內容來看乃引述宗密盂蘭盆經疏慈覺孝行録和契嵩孝論並摘取經藏而成教誡中稱本朝慈覺禪師可知思覺與宗賾慈覺同為宋僧宗賾慈覺神師孝行録久佚儀文中引述該書部分內容從而為研究他的孝道思想和宋代中國佛教孝道思想保存了難得的資料我們不能因為它不見中外歷代佛書記載就以為它是雲南獨有的又如劍川阿吒力現在常用的銷釋金剛科本名銷釋金剛經科儀見於續藏經明覺連重集銷釋金剛經科儀會要注解署宋隆興府百福院宗鏡禪師述則它顯然為中國僧人著述從內容上看它主要以姚秦鳩摩羅什譯金剛般若波羅蜜經為依據編集而成並且必須與坊間刻本金剛經卷首為奉請八金剛四菩薩等配合才能舉行法會內地僧人現在已不知道如何使用本科儀但阿吒力僧還能這並不證明阿吒力教傳自印度並自成體系祇表明阿吒力保存了內地佛教的一些較早的形式換句話說金剛經科儀至今仍為雲南劍川阿吒力廣泛使用可以說明今天的阿吒力的所作所為是漢地佛教的部分較早形式的遺存既然阿吒力經典是漢地佛教經典它們是何時傳入的阿吒力又是漢地佛教中的哪一支呢就雲南地方史來看宋揮玉斧儘管不盡符合歷史事實但大理國與宋代交往不多且主要以經濟往來為主這是不容否認的故即使有的科儀成書於宋代也不可能在大理國時期傳入雲南到了元代漢地佛教大規模傳入雲南儘管大都是禪講宗但也不能排除有科儀傳入惟當時雲南地方史志中尚無阿吒力一詞故阿吒力經典大規模傳入雲南的時間目前暫定為明初明初明政府將佛教寺院三分為禪講教所謂禪講教在當時的意思是其禪不立文字必見性者方是本宗講者務明諸經旨義教者演佛利濟之法消一切現造之業滌死者宿作之愆以訓世人對禪講的含義學者們的意見是一致的對教僧為從事瑜伽顯密法事儀式做法事為死者洗滌罪愆是經懺僧或應赴僧是佛教深入民間成為民俗的一種表現學者們的意見也是一致的但對教僧具體的所作所為不見有人作進一步的解釋究其原因是沒有可資研究的材料明洪武十六年曾命僧録司官對今瑜伽顯密法事儀式及諸真言密咒盡行考校穩當可為一定成規行於天下諸山寺院永遠遵守為孝子順孫慎終追遠之道人民州里之間祈禳伸請之用後在申明佛教榜冊中又規定顯密之教儀範科儀務遵洪武十六年頒降格式就現存阿吒力科儀真言有較統一的形式及阿吒力以做法事為其主要佛教活動來看可以肯定阿吒力教就是明代的教阿吒力僧就是明代的教僧如果想在明代教僧及中國民俗佛教的研究上有所突破就不能不研究雲南的阿吒力經典教在明初傳入雲南與明初的宗教政策有一定關係幻輪釋氏稽古略續集卷二載洪武二十一年明政府發布告令給僧録司讓其行文書各處僧司去但有討度牒的僧二十已上的發去烏蠻曲靖等處每三十里造一座庵自耕自食就化他一境的人故教於此後不久傳入雲南當無疑問教傳入雲南後為了能迅速發展教僧就替自己在雲南歷史上尋找依據元代及其以前稱僧人為阿左梨為了與之掛鉤教僧就擬出一系列音近的詞阿吒力阿吒力阿拶哩等他們還根據當時雲南流行一些說法編造自己的歷史由於明初白古通記將大理說成就是印度是妙香佛國大理土著有印度血統於是就有教僧稱夫西竺有姓名曰阿拶哩是毗盧遮耶族姓婆羅門從梵天口中而生教習祕密大道稽郡志唐貞觀時大士自乾竺來建大理以釋氏顯之教化人為善摩頂授記蒙氏細奴羅號為奇王主宰斯土選有德行者為阿吒力灌頂僧祈禱雨暘厥後復有贊陀崛多從摩伽陀國至此大闡瑜伽祕典著述降伏資益愛敬息災四術以顯化正像白古通記有衆多附會卻為時人推崇一樣教僧的附會在當時也很流行所以在明代雲南地方史志中才頻繁出現阿拶哩阿吒力阿叱力等詞並有贊陀崛多闡瑜伽教演祕密法祈禱必應至今雲南土僧名阿叱力者皆服其教的記載應當看到這些名詞和這些記載都是明代才出現的在元代及其以前並沒有所以真實的歷史是阿吒力並非觀音大士所選阿吒力所習與贊陀崛多所傳也風馬牛不相及明萬曆九年抄本諸齊道場牒式狀式詞式表式合本是阿吒力為明代的教的一有力證據其中所録牒文中的九州牒十三布政司城隍牒各布政總城隍牒顯然是明代全國各地通用的牒式祝國表謝恩表則為當時全國通用有表式這些表牒說明阿吒力不是雲南獨有的在明代這種形式的佛教通行全國破獄關中依科修建瑜伽顯密某道場一供的文字說明當時阿吒力所做上述道場齊事與瑜珈顯密都有關係而玉帝狀三元狀玉帝表青旦詞梓潼詞玄帝詞九天詞玉皇表玉帝表等是阿吒力僧日常齊事所用的詞表狀說明康熙雲南通志凡例中稱阿吒力教非釋非道的原因是由於明代的佛教到了清代在內地已無影響當時的人對明代的東西一無所知依自己有限的知識對阿吒力作了這樣的判斷因為從現存阿吒力科儀可以看出明代的教是密教傳入中國後在唐宋時期與中國傳統文化包括道教文化及佛教顯宗結合的産物它與一般意義上講的禪講宗不同與中國傳統宗教道教也不同故它不是道教而是佛教在阿吒力科儀中保留有不少密教的漢譯真言但大科儀的密教真言的格式大同小異如都有諸部因緣等內容在不少小科儀中也常有教有真言這樣的文字所以無論如何阿吒力教教也祇是中國漢地密教的通俗化而不是自成系統的密教而且阿吒力僧也不全是密僧因為阿吒力在修建道場時由於科儀一般分為教誡儀文提綱和密教必須將它們相互配合才能圓滿地完成一台瑜伽顯密法會僧人因此也就至少分為主教法師又稱秉教法師統管道場全面工作主儀法師負責儀文的唱念提綱法師負責提綱部分和主密法師又稱為密教師負責密教部分細分則還有掌壇法師負責主持某一壇法事主經法師按法事進行程序唱念相應佛經表白法師禮懺法師鐘鼓法師鐃鉢法師等等但不論何種法師都祇是暫定的祇要能吹打唱念任何受過比丘大戒的僧人受過具戒才可以使用佛法僧三寶印都可以充任主教法師或密教師以及其他法師並不是祇有密僧來行持法事所以明代雲南地方文獻中的祕密僧叱力等其實就是當時佛教寺院三分時的教僧明代雲南地方史志對他們的記載由於受白古通記的影響有不少地方需作仔細考究才能弄清真相從科儀還可看出教僧一開始肯定是沙門按當時的記載不排除一些僧人私有眷屬潛住民間的情況他們在詞表文中稱沙門某比丘某所用科儀中則有比丘某的字樣從請祖法事則可以看出他們都出自禪宗並按禪宗有臨濟曹洞雲門等宗譜系排定法名但必須受過比丘戒的僧人才能主持法事可以使用佛法僧三寶印後來因為僧人沒了傳承一批受過菩薩戒的在家居士繼承了教僧的事業與僧人有區別的地方是自稱緇流某在所用科儀中也用這一稱呼但個別科儀也有因脫漏而未改仍有使用比丘某的情況因此阿吒力在一些地方成了世襲並子子孫孫一代一代傳了下來當然由於阿吒力行持法事是照本宣科故在科儀和經典遺失或焚燬後一些重要法事活動也就隨之消失了而有一部分經典存世自然也就為解開阿吒力之謎提供了必要的條件為我們瞭解宋代及其以後中國俗佛教提供了頗有價值的資料三阿吒力教經典是研究中國民俗佛教的重要資料世俗化是中國佛教的總趨向但中國佛教明顯的世俗化是在五代北宋之際具體的表現是從義理性佛教過渡到民俗性佛教此後到世紀晚清的一千多年佛教與中國民間社會血肉相連對中國民間的社會生活産生了巨大的影響所以在中國佛教史上五代北宋至晚清作為佛教中國化的真正表現被視為中國民俗佛教或中國俗佛教時期但是民俗佛教研究是長期遭人忽視的領域以往佛教史籍多偏重於介紹學理佛方面的高僧教理事件等這樣並不足以反映中國佛教的全貌尤其不能突出佛教用於社會教化的功能很大程度上存在這種狀況的原因是缺乏足資研究的資料當前人們正借鑒民俗學人類學社會學的方法重新省察佛教反思以往中國佛教史的研究工作重新檢察宋元明清佛教的歷史價值現存阿吒力教經典如楞嚴解冤釋結道場儀如來廣孝十種報恩道場儀銷釋金剛經科儀等宋代中國僧人著述及大量明代教僧所用科儀無疑就是這一工作中值得重視的新資料但由於現在存世阿吒力及阿吒力經典已經不多為適應這一契機對雲南阿吒力教進行全方位的調查培養新生力量可以說是對中華古代文化遺産保護的搶救的重要措施而對雲南阿吒力教經典的整理和研究不僅可以幫助我們對阿吒力教有一個清楚的認識而且可以加深我們對宋代以後中國民俗佛教尤其是明代的教的認識這對中國佛教史的研究和佛教中國化的研究無疑都有重要的意義以往由於各種原因對阿吒力經典的認識存在不少失誤現在發現新資料了希望大家對之給以一定的關心注意從不同的角度使用不同的方法來進行研究這項工作做好了對雲南佛教史對中國佛教史的研究都是不小的貢獻
